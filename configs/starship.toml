"$schema" = 'https://starship.rs/config-schema.json'

format = """
[оӮ¶](red)\
$os\
$username\
[оӮҙ](bg:peach fg:red)\
$directory\
[оӮҙ](fg:peach bg:yellow)\
$git_branch\
$git_status\
$git_state\
$git_metrics\
[оӮҙ](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$python\
$package\
[оӮҙ](fg:green bg:sapphire)\
$docker_context\
$kubernetes\
[оӮҙ](fg:sapphire bg:lavender)\
$time\
[оӮҙ](fg:lavender)\
$cmd_duration\
$line_break\
$character"""

add_newline = false
scan_timeout = 35
command_timeout = 700

palette = 'catppuccin_mocha'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Windows = "п…ә"
Ubuntu = "пҢӣ"
SUSE = "пҢ”"
Raspbian = "пҢ•"
Mint = "пҢҺ"
Macos = "п…№"
Manjaro = "пҢ’"
Linux = "п…ј"
Gentoo = "пҢҚ"
Fedora = "пҢҠ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "п…»"
Arch = "пҢғ"
Debian = "пҢҶ"
Redhat = "пҢ–"

[username]
show_always = false
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = " "
read_only = " пҖЈ"

[directory.substitutions]
"Documents" = "пғ¶ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "
"Developer" = "п„Ў "
"Desktop" = "п„Ҳ "

[git_branch]
symbol = "оӮ "
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'
truncation_length = 24

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[git_state]
style = "bg:yellow"
format = '[[ $state( $progress_current/$progress_total) ](fg:crust bg:yellow)]($style)'

[git_metrics]
disabled = false
added_style = "fg:green bg:yellow"
deleted_style = "fg:red bg:yellow"
format = '[[+$added]($added_style)/[-$deleted]($deleted_style) ](fg:crust bg:yellow)'

[nodejs]
symbol = "оңҳ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = "оҳһ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'
disabled = true

[golang]
symbol = "оҳ§"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'
disabled = true

[php]
symbol = "оңҪ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'
disabled = true

[java]
symbol = "оү– "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'
disabled = true

[kotlin]
symbol = "оҳҙ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'
disabled = true

[haskell]
symbol = "оҳҹ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'
disabled = true

[python]
symbol = "оңј"
style = "bg:green"
format = '[[ $symbol( $version)(\($virtualenv\)) ](fg:crust bg:green)]($style)'
disabled = true

[docker_context]
symbol = "пҢҲ"
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[  $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[оӮ°](bold fg:green)'
error_symbol = '[оӮ°](bold fg:red)'
vimcmd_symbol = '[оӮІ](bold fg:green)'
vimcmd_replace_one_symbol = '[оӮІ](bold fg:mauve)'
vimcmd_replace_symbol = '[оӮІ](bold fg:mauve)'
vimcmd_visual_symbol = '[оӮІ](bold fg:yellow)'

[cmd_duration]
min_time = 2_000
format = '[[  $duration ](fg:crust bg:teal)]($style)'
disabled = false

[status]
disabled = false
style = "bg:surface2"
format = '[[ вң– $status ](fg:crust bg:yellow)]($style)'
map_symbol = true
recognize_signal_code = true

[jobs]
threshold = 1
symbol = ""
style = "bg:surface1"
format = '[[ $symbol $number ](fg:crust bg:yellow)]($style)'

[aws]
disabled = true

[kubernetes]
disabled = false
style = "bg:sapphire"
format = '[[ уұғҫ $context( \($namespace\)) ](fg:crust bg:sapphire)]($style)'
detect_files = ["kustomization.yaml", "Chart.yaml", "helmfile.yaml"]

[package]
disabled = false
symbol = "у°Ҹ—"
style = "bg:green"
format = '[[ $symbol $version ](fg:crust bg:green)]($style)'

[ruby]
disabled = true

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
